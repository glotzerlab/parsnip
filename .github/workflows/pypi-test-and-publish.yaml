name: Build and Publish

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"
      - "breaking"
  pull_request:

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "0.11.29"
    - name: uv build
      run: uv build --verbose -o dist
    - name: Store the distribution packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: python-package-distributions
        path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/parsnip-cif
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/

    # If a PR originated from a fork, the token required for upload is not present
    # Should this be the case, we skip the TestPyPI action
    - name: Check OIDC token availability
      id: check-oidc
      run: |
        if [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Publish to TestPyPI
      if: steps.check-oidc.outputs.available == 'true'
      uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
        skip-existing: true
        verify-metadata: true

  publish-to-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/parsnip-cif
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish to PyPI
      # TODO: https://github.com/pypa/gh-action-pypi-publish/pull/378
      uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
