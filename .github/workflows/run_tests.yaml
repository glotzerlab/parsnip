name: Run tests

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      requirements-file:
        required: true
        type: string
      freethreaded:
        required: false
        type: boolean
        default: false

jobs:
  run_test:
    runs-on: ${{ inputs.runs-on }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.11.6"

    - name: Install package
      run: |
        which python
        python --version
        uv pip install . -r ${{ inputs.requirements-file }} -v --reinstall --system
        python -c "import parsnip; print('parsnip', parsnip.__version__)"

    - name: Verify GIL disabled
      if: inputs.freethreaded
      run: python -c "import sys; assert not sys._is_gil_enabled()"

    - name: Verify GIL enabled
      if: ${{ !inputs.freethreaded }}
      run: |
        python -c "import sys; assert getattr(sys, '_is_gil_enabled', lambda: True)()"

    - name: Test with pytest
      run: python -m ${{ runner.os != 'Windows' && 'pytest' || 'pytest tests' }} -v -n auto
