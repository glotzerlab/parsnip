name: Run tests

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      requirements-file:
        required: true
        type: string
      freethreaded:
        required: false
        type: boolean
        default: false

jobs:
  run_test:
    runs-on: ${{ inputs.runs-on }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      with:
        version: "0.11.27"

    - name: Disable GIL for freethreaded builds
      if: inputs.freethreaded
      run: echo "PYTHON_GIL=0" >> "$GITHUB_ENV"

    - name: Install package
      run: |
        which python
        python --version
        uv pip install . -r ${{ inputs.requirements-file }} -v --reinstall --system
        python -c "import parsnip; print('parsnip', parsnip.__version__)"
        python -c "import sys; print('GIL:', getattr(sys, '_is_gil_enabled', lambda: 'unknown')())"

    - name: Test with pytest
      run: python -m ${{ runner.os != 'Windows' && 'pytest' || 'pytest tests' }} -v -n auto
